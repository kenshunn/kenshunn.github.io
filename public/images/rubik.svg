<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="Rubik's Cube Cipher">
  <!-- scroll / research paper -->
  <rect x="148" y="40" width="104" height="140" rx="5" fill="#EFE6CC"/>
  <!-- rolled top and bottom -->
  <rect x="134" y="30" width="132" height="20" rx="10" fill="#CBBE98"/>
  <rect x="134" y="170" width="132" height="20" rx="10" fill="#CBBE98"/>
  <rect x="138" y="34" width="124" height="4" rx="2" fill="#B7AC85"/>
  <rect x="138" y="182" width="124" height="4" rx="2" fill="#B7AC85"/>

  <!-- rubik's 3x3 grid (the cipher) -->
  <g transform="translate(168,58)">
    <g fill="#10B981">
      <rect x="0"  y="0"  width="18" height="18" rx="3"/>
      <rect x="23" y="0"  width="18" height="18" rx="3" opacity="0.6"/>
      <rect x="46" y="0"  width="18" height="18" rx="3"/>
      <rect x="0"  y="23" width="18" height="18" rx="3" opacity="0.6"/>
      <rect x="23" y="23" width="18" height="18" rx="3"/>
      <rect x="46" y="23" width="18" height="18" rx="3" opacity="0.6"/>
      <rect x="0"  y="46" width="18" height="18" rx="3"/>
      <rect x="23" y="46" width="18" height="18" rx="3" opacity="0.6"/>
      <rect x="46" y="46" width="18" height="18" rx="3"/>
    </g>
  </g>

  <!-- text lines suggesting a paper -->
  <g fill="#B7AC85">
    <rect x="162" y="138" width="76" height="5" rx="2.5"/>
    <rect x="162" y="150" width="76" height="5" rx="2.5"/>
    <rect x="162" y="162" width="52" height="5" rx="2.5"/>
  </g>
</svg>
